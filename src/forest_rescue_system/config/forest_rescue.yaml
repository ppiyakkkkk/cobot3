rviz_visualization_node:
  ros__parameters:
    ground_truth_path: ~/b3_cobot3_ws/isaac_sim/generated_ground_truth.json
    terrain_mesh_path: ~/b3_cobot3_ws/isaac_sim/generated_terrain_mesh.npz
    environment_mesh_path: ~/b3_cobot3_ws/isaac_sim/generated_environment_meshes.npz
    scene_marker_topic: /forest_rescue/scene_markers
    terrain_marker_topic: /forest_rescue/terrain_mesh
    environment_marker_topic: /forest_rescue/environment_meshes
    map_frame: map
    # 실제 값은 launch의 operation_mode가 덮어쓴다.
    operation_mode: rescue_search
    # 실제 목록은 launch의 drone_count(1~4)가 덮어쓴다.
    drone_ids: [quadrotor_01, quadrotor_02, quadrotor_03]
    drone_marker_topic: /forest_rescue/drone_markers
    refresh_period_sec: 0.5
    # 초록색 반투명 산 표면
    terrain_color_rgb: [0.10, 0.55, 0.12]
    terrain_alpha: 0.72
    terrain_z_offset_m: 0.0

    # 실제 USD 그룹별 표시 색상
    pineforest_color_rgb: [0.03, 0.28, 0.06]
    pineforest_alpha: 1.0
    broadleafforest_color_rgb: [0.12, 0.48, 0.10]
    broadleafforest_alpha: 1.0
    bushes_color_rgb: [0.42, 0.68, 0.10]
    bushes_alpha: 1.0
    rocks_color_rgb: [0.42, 0.42, 0.45]
    rocks_alpha: 1.0

mission_manager_node:
  ros__parameters:
    operation_mode: rescue_search
    # 실제 목록은 launch의 drone_count(1~4)가 덮어쓴다.
    drone_ids: [quadrotor_01, quadrotor_02, quadrotor_03]
    search_plan_path: ~/b3_cobot3_ws/isaac_sim/generated_search_plan.json
    # Isaac Sim과 ROS launch의 drone_count가 다르면 수색 시작을 거부한다.
    require_search_plan_match: true
    fallback_search_area_bounds_xy: [-46.7, 46.7, -46.7, 46.7]
    required_detection_frames: 3
    minimum_detection_confidence: 0.40
    # 미션 시작 지점에 있는 구조자를 조난자로 확정하지 않는 유예시간
    detection_start_delay_sec: 5.0
    require_map_position_before_detection: true
    start_exclusion_radius_m: 15.0
    start_exclusion_centers_xy: [-34.0, 40.0, -29.0, 40.0, -39.0, 40.0, -34.0, 45.0]
    # 동일 RGB stamp의 map 위치 3개가 이 반경 안에서 일치해야 확정한다.
    detection_position_consistency_radius_m: 4.0
    detection_position_timeout_sec: 1.0
    detection_window_sec: 2.0
    maximum_missed_detections: 2
    # 조난자 바로 위가 아니라 이 높이만큼 위의 안전 지점으로 접근한다.
    victim_approach_height_m: 7.0
    # generated_search_plan.json을 우선 사용하며, 아래 값은 V1 호환용이다.
    search_zone_bounds_xy: [-46.7, 46.7, 13.55, 46.7, -46.7, 46.7, -13.55, 13.55, -46.7, 46.7, -46.7, -13.55]
    auto_takeoff_on_connect: true
    terrain_mesh_path: ~/b3_cobot3_ws/isaac_sim/generated_terrain_mesh.npz
    cooperative_lane_spacing_m: 4.0
    cooperative_sample_spacing_m: 4.0
    cooperative_terrain_profile_spacing_m: 1.0
    cooperative_transit_altitude_step_m: 2.0
    cooperative_subzone_margin_m: 0.6
    cooperative_prepare_timeout_sec: 20.0
    cooperative_marker_topic: /mission/cooperative_search/markers

mapping_manager_node:
  ros__parameters:
    operation_mode: mapping_3d
    # 실제 목록은 launch의 drone_count(1~4)가 덮어쓴다.
    drone_ids: [quadrotor_01, quadrotor_02, quadrotor_03]
    # 현재 골격에서도 PX4 연결 후 초기 이륙·Hover까지 검증한다.
    auto_takeoff_on_connect: true
    ground_truth_path: ~/b3_cobot3_ws/isaac_sim/generated_ground_truth.json
    require_simulation_mode_match: true

# ---------------------------------------------------------------------------
# Drone 01
# ---------------------------------------------------------------------------
human_detector_01:
  ros__parameters:
    drone_id: quadrotor_01
    image_topic: /quadrotor_01/Camera/rgb
    detection_topic: /drone_01/victim/detection
    annotated_image_topic: /drone_01/victim/annotated_image
    mission_state_topic: /mission/state
    finder_drone_topic: /mission/finder_drone
    detector_mode: yolo
    model_path: ~/b3_cobot3_ws/models/yolo11s.pt
    person_class_id: 0
    confidence_threshold: 0.40
    inference_period_sec: 0.05
    inference_image_size: 960
    save_confirmed_image: true
    detected_images_dir: ~/b3_cobot3_ws/detected_images
    saved_image_jpeg_quality: 95
    detection_start_delay_sec: 5.0
    detect_only_while_searching: true
    active_detection_states: [SEARCHING, COOP_SEARCH_PREPARING, COOP_SEARCH_TRANSIT, COOP_SEARCHING]
    mock_delay_sec: 8.0
    mock_confidence: 0.95
    mock_x_min_ratio: 0.46
    mock_y_min_ratio: 0.38
    mock_x_max_ratio: 0.54
    mock_y_max_ratio: 0.66

victim_localizer_01:
  ros__parameters:
    drone_id: quadrotor_01
    depth_topic: /quadrotor_01/Camera/depth
    camera_info_topic: /quadrotor_01/Camera/camera_info
    detection_topic: /drone_01/victim/detection
    camera_position_topic: /drone_01/victim/position_camera
    map_position_topic: /drone_01/victim/position_map
    mission_state_topic: /mission/state
    active_localization_states: [SEARCHING, COOP_SEARCH_TRANSIT, COOP_SEARCHING, VICTIM_DETECTED, VICTIM_LOCATED]
    camera_frame_override: quadrotor_01/camera_optical_frame
    map_frame: map
    roi_center_ratio: 0.50
    minimum_depth_m: 0.20
    maximum_depth_m: 30.0
    depth_buffer_duration_sec: 1.0
    depth_buffer_max_frames: 40
    max_depth_detection_time_delta_sec: 0.25
    # RGB 촬영 시각보다 TF 수신이 수십 ms 늦을 때 콜백을 막지 않고 재시도
    tf_retry_timeout_sec: 1.0
    tf_retry_period_sec: 0.02
    tf_retry_max_points: 40
    log_period_sec: 10.0

sensor_tf_01:
  ros__parameters:
    base_frame: quadrotor_01/base_link
    camera_frame: quadrotor_01/camera_optical_frame
    lidar_frame: quadrotor_01/base_scan
    camera_translation: [0.0, 0.0, 0.0]
    # Isaac sim_config.py의 CAMERA_DOWN_TILT_DEG와 같은 값이다.
    camera_down_tilt_deg: 40.0
    derive_camera_quaternion_from_tilt: true
    camera_quaternion_xyzw: [-0.640856, 0.640856, -0.298836, 0.298836]
    lidar_translation: [0.0, 0.0, 0.15]
    lidar_quaternion_xyzw: [0.0, 0.0, 0.0, 1.0]

pointcloud_local_mapper_01:
  ros__parameters:
    drone_id: quadrotor_01
    point_cloud_topic: /quadrotor_01/point_cloud
    mission_state_topic: /mission/state
    map_frame: map
    body_frame: quadrotor_01/base_scan
    accumulated_cloud_topic: /drone_01/obstacle/accumulated_cloud
    accumulated_cloud_body_topic: /drone_01/obstacle/accumulated_cloud_body
    local_costmap_topic: /drone_01/obstacle/local_costmap
    # 최근 3초를 슬라이딩 윈도우로 유지한다.
    accumulation_sec: 3.0
    processing_period_sec: 0.10
    publish_period_sec: 0.20
    # PointCloud가 먼저 도착해도 콜백을 막지 않고 exact timestamp TF를 기다린다.
    tf_retry_period_sec: 0.02
    # 시뮬레이션이 느릴 때도 한두 TF 주기를 충분히 기다리도록 wall time 1초.
    tf_exact_wait_sec: 1.00
    # 누적 지도에는 exact timestamp TF만 사용하며 latest TF로 대체하지 않는다.
    pending_cloud_queue_size: 30
    # 잘못된 한 프레임이 뒤 프레임 처리를 막지 않도록 매 주기 여러 개를 검사한다.
    max_pending_clouds_per_cycle: 8
    voxel_size_m: 0.25
    minimum_voxel_observations: 2
    maximum_points_per_scan: 30000
    minimum_height_m: -1.2
    maximum_height_m: 1.8
    local_costmap_size_m: 30.0
    local_costmap_resolution_m: 0.25
    obstacle_inflation_radius_m: 1.10
    self_filter_radius_m: 0.65
    active_mission_states: [INITIAL_TAKEOFF, INITIAL_HOVER, READY, SEARCHING, COOP_SEARCH_PREPARING, COOP_SEARCH_TRANSIT, COOP_SEARCHING, COOP_SEARCH_COMPLETE, VICTIM_DETECTED, RETURNING_NO_VICTIM, COMPLETE, MISSION_FAILED]
    warning_period_sec: 5.0

obstacle_monitor_01:
  ros__parameters:
    drone_id: quadrotor_01
    point_cloud_topic: /quadrotor_01/point_cloud
    accumulated_point_cloud_topic: /drone_01/obstacle/accumulated_cloud_body
    use_accumulated_cloud_for_astar: true
    accumulated_cloud_max_age_sec: 0.8
    local_astar_path_topic: /drone_01/obstacle/local_astar_path
    blocked_topic: /drone_01/obstacle/blocked
    distance_topic: /drone_01/obstacle/min_distance
    planning_obstacle_distance_topic: /drone_01/obstacle/planning_distance
    clearances_topic: /drone_01/obstacle/clearances
    avoidance_vector_topic: /drone_01/obstacle/avoidance_vector
    local_detour_topic: /drone_01/obstacle/local_detour_body
    movement_direction_topic: /drone_01/navigation/direction_body_rad
    mission_state_topic: /mission/state
    safety_distance_m: 4.0
    # 360° 비상 정지는 실제 충돌 임박 거리에서만 사용한다. 옆 나무가
    # 1~2m 떨어진 정상 통로까지 전방 차단으로 오인하지 않게 한다.
    emergency_distance_m: 1.2
    front_sector_half_angle_deg: 35.0
    side_sector_offset_deg: 70.0
    side_sector_half_angle_deg: 30.0
    minimum_obstacle_points: 3
    blocked_confirm_scans: 2
    clear_confirm_scans: 3
    processing_period_sec: 0.10
    minimum_height_m: -1.2
    maximum_height_m: 1.8
    active_mission_states: [INITIAL_TAKEOFF, INITIAL_HOVER, READY, SEARCHING, COOP_SEARCH_PREPARING, COOP_SEARCH_TRANSIT, COOP_SEARCHING, COOP_SEARCH_COMPLETE, VICTIM_DETECTED, RETURNING_NO_VICTIM, COMPLETE, MISSION_FAILED]
    candidate_offsets_deg: [0.0, -15.0, 15.0, -30.0, 30.0, -45.0, 45.0, -60.0, 60.0, -75.0, 75.0]
    candidate_sector_half_angle_deg: 12.0
    candidate_min_clearance_m: 3.5
    candidate_score_distance_cap_m: 15.0
    candidate_turn_penalty: 1.2
    candidate_forward_progress_weight: 3.0
    candidate_side_switch_penalty: 4.0
    candidate_side_hold_sec: 2.0
    candidate_max_offset_deg: 80.0
    local_grid_size_m: 30.0
    local_grid_resolution_m: 0.25
    obstacle_inflation_radius_m: 1.10
    local_planner_goal_distance_m: 10.0
    local_planner_lookahead_m: 3.5
    local_planner_period_sec: 0.40
    proactive_avoidance_enabled: true
    proactive_planning_distance_m: 10.0
    proactive_corridor_half_width_m: 1.10
    proactive_ignore_near_m: 0.80
    proactive_min_obstacle_voxels: 2
    planner_start_release_radius_m: 0.50
    local_planner_min_forward_progress_m: -0.10
    warning_period_sec: 5.0

